<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="CountdownTimer">
    <div class="CountdownTimer-header">
      <h2>Countdown Timer</h2>
    </div>
    
    <div class="CountdownTimer-display">
      
      <div class="CountdownTimer-display-text-day">
        <p class="day-display-scripted">
          00
        </p>
        <div class="display-label-days">Days</div>  
      </div>
      

      <div class="CountdownTimer-display-text-hour">
        <p class="hours-display-scripted">
          00
        </p>
        <div class="display-label-hours">Hours</div>
      </div>

      <div class="CountdownTimer-display-text-minutes">
        <p class="minutes-display-scripted">
          00
        </p>
        <div class="display-label-minutes">Minutes</div>
      </div>

      <div class="CountdownTimer-display-text-seconds">
        <p class="seconds-display-scripted">
          00
        </p>
        <div class="display-label-seconds">Seconds</div>
      </div>
    </div>
    <div class="inputDiv">
      <input type="datetime-local" id="inputTime" name="myInput" placeholder="Enter Your Time Here"> 
    </div>

    <!--
    <div class="CountdownTimer-btn">
      <button class="CountdownTimer-btn-start">Start</button>
      <button class="CountdownTimer-btn-pause">Pause</button>
      <button class="CountdownTimer-btn-reset">Reset</button>
    </div>
    
    <div class="CountdownTimer-btn">
      <button class="CountdownTimer-btn-start">Start</button>
      <button class="CountdownTimer-btn-pause">Pause</button>
      <button class="CountdownTimer-btn-reset">Reset</button>
    </div> 
    -->

  </div>
  
  <script src="script.js"></script>
</body>
</html>
