<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./style.css" rel="stylesheet">
  <title>Rock Paper Scissors</title>
</head>
<body>
  <div class='game-container'>
    <h1>Rock Paper Scissors</h1>
    <div class="game-notif">
      <p id="determine-winner">Lets Play!</p>
      
      <div class="game-notif2">
        <p id="player-pick">Player picked: </p>
        <p id="computer-pick">Computer picked: </p>
        <p id="player-score">Player Score</p>
        <p id="computer-score">Computer Score</p>
      </div>
      
    </div>
    

  <div class="game-btns">
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button> 
    
  </div>
    <button id="resetbtn">Reset</button>
  </div>

<script src="script.js"></script>
</body>
</html>
