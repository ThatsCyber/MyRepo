<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        /* Add your CSS here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
}

        #calculator {
            width: 200px;
            margin: 100px auto;
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0px 0px 10px 0px #000;
        }

        #display {
            height: 40px;
            margin-bottom: 10px;
            padding: 5px;
            text-align: right;
            border: 1px solid #999;
            background-color: #eee;
        }

        .num, .op, .equals, .clear {
            width: 48px;
            height: 40px;
            margin-right: 2px;
            margin-bottom: 2px;
            background-color: black; /* Background color of the buttons */
            color: white; /* Color of the numbers and symbols on the buttons */
        }

    </style>
</head>
<body>
    <div id="calculator">
        <div id="display"></div>
        <div id="buttons">
            <button class="num">1</button>
            <button class="num">2</button>
            <button class="num">3</button>
            <button class="num">4</button>
            <button class="num">5</button>
            <button class="num">6</button>
            <button class="num">7</button>
            <button class="num">8</button>
            <button class="num">9</button>
            <button class="num">0</button>
            <button class="op">+</button>
            <button class="op">-</button>
            <button class="op">*</button>
            <button class="op">/</button>
            <button class="clear">C</button>
            
            <button class="equals">=</button>
            
        </div>
    </div>

    <script>
        // Add your JavaScript here
            let display = document.getElementById('display');
            let buttons = Array.from(document.getElementsByClassName('num'));
            let operators = Array.from(document.getElementsByClassName('op'));
            let equals = document.getElementsByClassName('equals')[0];
            let clear = document.getElementsByClassName('clear')[0];

            buttons.map( button => {
                button.addEventListener('click', (e) => {
                    display.innerText += e.target.innerText;
                });
            });

            operators.map( operator => {
                operator.addEventListener('click', (e) => {
                    display.innerText += ` ${e.target.innerText} `;
                });
            });

            equals.addEventListener('click', () => {
                try{
                    display.innerText = eval(display.innerText);
                } catch {
                    display.innerText = "Error"
                }
            });

            clear.addEventListener('click', () => {
                display.innerText = '';
            });

    </script>
</body>
</html>
