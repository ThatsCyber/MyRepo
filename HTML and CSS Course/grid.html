<!DOCTYPE html>
<html>
  <head>
    <title>
      Petbook
    </title>
    <link rel="stylesheet" href="petbookstyle.css">
  </head>
  <body>
    <h1 class="title">Petbook</h1>
    <div class="profile-grid">
      <!-- Rat -->
      <div class="profile-card">
        <img src="Images/petbook images/-cool-and-unique-exotic-wild-pets-youve-never-heard-of.jpg" alt="Profile Picture 1">
          <h2 class="name">Lil Skimp</h2>
        <p class="mutual-friends">Mutual Friends: 5</p>
        <button class="add-friend-button">Add Friend</button>
      </div>
      <!-- Leona -->
      <div class="profile-card">
        <img src="Images/petbook images/IMG_7306.JPG" alt="Profile Picture 2">
        <h2 class="name">Likely Possesed</h2>
        <p class="mutual-friends"> <img src="Images/petbook images/wp2447092.jpg">Mutual Friends: 3
        </p>
        <button class="add-friend-button">Add Friend</button>
      </div>
      <!-- Lemur Thing -->
      <div class="profile-card">
        <img src="Images/petbook images/OIP.jpg" alt="Profile Picture 3">
        <h2 class="name">Fred</h2>
        <p class="mutual-friends">Mutual Friends: 4</p>
        <button class="add-friend-button">Add Friend</button>
      </div>
    </div>
      <!-- Dog -->
    <div class="profile-grid">
      <div class="profile-card">
        <img src="Images/petbook images/pet.health.senior.pets_.body2_.jpg" alt="Profile Picture 1">
        <h2 class="name">Happy</h2>
        <p class="mutual-friends"><img src="Images/petbook images/wp2447092.jpg"> Mutual Friends: 6</p>
        <button class="add-friend-button">Add Friend</button>
      </div>
      <!-- High Dog Thing -->
      <div class="profile-card">
        <img src="Images/petbook images/R (1).jpg" alt="Profile Picture 2">
        <h2 class="name">High how r u</h2>
        <p class="mutual-friends">Mutual Friends: 3</p>
        <button class="add-friend-button">Add Friend</button>
      </div>
      <!-- Panda? -->
      <div class="profile-card">
        <img src="Images/petbook images/R.jpg" alt="Profile Picture 3">
        <h2 class="name">Drowsy</h2>
        <p class="mutual-friends">Mutual Friends: 2</p>
        <button class="add-friend-button">Add Friend</button>
      </div>
    </div>
    
  </body>
<!--display: grid;
  grid-template-columns:
  After you created div, you can create a grid by using display: grid; and grid-template-columns:
  And with the grid columns, use "1fr 1fr, 1fr" etc to separate the columns equally-->
</html>
